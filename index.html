// ─────────────────────────────────────────────────────────
//  SERVER CONNECTION
// ─────────────────────────────────────────────────────────
const SERVER_URL = 'https://lcs-server.onrender.com'; // Render — Stage 1
let socket = null;
let serverOnline = false;

function connectToServer(onStatus) {
  try {
    socket = io(SERVER_URL, { transports:['websocket'], timeout:6000 });
    socket.on('connect',       () => { serverOnline=true;  onStatus(true);  });
    socket.on('connect_error', () => { serverOnline=false; onStatus(false); });
    socket.on('disconnect',    () => { serverOnline=false; onStatus(false); });
  } catch(e) { onStatus(false); }
}

// ─────────────────────────────────────────────────────────
//  SAVE / LOAD
// ─────────────────────────────────────────────────────────
function loadData() {
  const defUnlocked = CHARS.filter(c => c.cost === 0).map(c => c.id);
  return {
    coins:    parseInt(localStorage.getItem('br_coins') || '0'),
    unlocked: JSON.parse(localStorage.getItem('br_unlocked') || JSON.stringify(defUnlocked))
  };
}
function saveData(d) {
  localStorage.setItem('br_coins',    String(d.coins));
  localStorage.setItem('br_unlocked', JSON.stringify(d.unlocked));
}

// ─────────────────────────────────────────────────────────
//  SHARED UTILITIES
// ─────────────────────────────────────────────────────────
function buildTextures(scene) {
  const t = (key, w, h, fn) => {
    if (scene.textures.exists(key)) return;
    const g = scene.make.graphics({ x:0, y:0, add:false });
    fn(g); g.generateTexture(key, w, h); g.destroy();
  };

  // Pre-create special bullet textures before the loop so the loop skips these keys
  t('rex_b', 18, 18, g => {
    g.fillStyle(0x553311); g.fillCircle(9,9,9);
    g.fillStyle(0xff8800,0.75); g.fillCircle(9,9,5);
    g.fillStyle(0xffdd00,0.45); g.fillCircle(7,7,3);
  });
  t('lancer_b', 36, 10, g => {
    g.fillStyle(0xddaa66); g.fillRect(0,1,32,8);
    g.fillStyle(0xffee99); g.fillRect(2,3,28,4);
    g.fillStyle(0xffffff,0.5); g.fillRect(4,3,12,2);
  });
  t('shrapnel', 8, 8, g => {
    g.fillStyle(0xff6600); g.fillCircle(4,4,4);
    g.fillStyle(0xffaa44,0.6); g.fillCircle(3,3,2);
  });

  CHARS.forEach(c => {
    // small sprite 48x48
    t(c.id+'_sm', 48, 48, g => {
      g.fillStyle(c.color);  g.fillCircle(24,24,24);
      g.fillStyle(c.accent); g.fillCircle(24,24,14);
      g.fillStyle(c.color);  g.fillCircle(24,24,7);
      g.fillStyle(c.eye);    g.fillCircle(19,18,5);
      g.fillStyle(0x000000); g.fillCircle(20,19,2);
    });
    // card sprite 64x64
    t(c.id+'_md', 64, 64, g => {
      g.fillStyle(c.color);  g.fillCircle(32,32,32);
      g.fillStyle(c.accent); g.fillCircle(32,32,19);
      g.fillStyle(c.color);  g.fillCircle(32,32,9);
      g.fillStyle(c.eye);    g.fillCircle(25,23,7);
      g.fillStyle(0x000000); g.fillCircle(26,24,3);
    });
    // character-specific bullet 14x14
    t(c.id+'_b', 14, 14, g => {
      g.fillStyle(c.bulletColor); g.fillCircle(7,7,7);
      g.fillStyle(0xffffff,0.35); g.fillCircle(5,5,3);
    });
  });

  t('ebullet',12,12, g => {
    g.fillStyle(0xff44aa); g.fillCircle(6,6,6);
    g.fillStyle(0xffaadd); g.fillCircle(6,6,3);
  });
  t('enemy',44,44, g => {
    g.fillStyle(0x6622aa); g.fillCircle(22,22,22);
    g.fillStyle(0x9944cc); g.fillCircle(22,22,13);
    g.fillStyle(0xcc88ff); g.fillCircle(22,22,6);
    g.fillStyle(0xffffff); g.fillCircle(17,16,4);
    g.fillStyle(0x000000); g.fillCircle(18,17,2);
  });
  t('wall',64,64, g => {
    g.fillStyle(0x665544); g.fillRect(0,0,64,64);
    g.fillStyle(0x887766); g.fillRect(3,3,58,58);
    g.fillStyle(0x554433); g.fillRect(6,6,52,52);
    g.fillStyle(0x776655); g.fillRect(9,9,46,46);
  });
  t('coin',20,20, g => {
    g.fillStyle(0xffdd00); g.fillCircle(10,10,10);
    g.fillStyle(0xffaa00); g.fillCircle(10,10,7);
    g.fillStyle(0xffee88); g.fillCircle(8,8,3);
  });
}

function drawBG(scene) {
  const g = scene.add.graphics();
  g.fillStyle(0x080818); g.fillRect(0,0,W,H);
  g.fillStyle(0xffffff,0.6);
  for (let i=0;i<90;i++) {
    g.fillCircle(
      Phaser.Math.Between(0,W), Phaser.Math.Between(0,H),
      Phaser.Math.FloatBetween(0.5,2)
    );
  }
  g.fillStyle(0x1a0033,0.4); g.fillCircle(W*0.15,H*0.25,110);
  g.fillStyle(0x001a33,0.4); g.fillCircle(W*0.85,H*0.75,95);
  g.fillStyle(0x1a1a00,0.3); g.fillCircle(W*0.6, H*0.2, 80);
}

function makeBtn(scene, x, y, w, h, label, color=0xee8800) {
  const c = scene.add.container(x,y);
  const sh = scene.add.graphics();
  sh.fillStyle(0x000000,0.35);
  sh.fillRoundedRect(-w/2+3,-h/2+3,w,h,h/2);
  const bg = scene.add.graphics();
  bg.fillStyle(color,1);
  bg.fillRoundedRect(-w/2,-h/2,w,h,h/2);
  bg.fillStyle(0xffffff,0.15);
  bg.fillRoundedRect(-w/2+3,-h/2+3,w-6,h*0.45,4);
  const tx = scene.add.text(0,1,label,{
    fontSize:Math.floor(h*0.4)+'px', color:'#ffffff',
    stroke:'#00000099', strokeThickness:3, fontStyle:'bold'
  }).setOrigin(0.5);
  c.add([sh,bg,tx]);
  c.setInteractive(new Phaser.Geom.Rectangle(-w/2,-h/2,w,h), Phaser.Geom.Rectangle.Contains);
  c.on('pointerover',()=>scene.tweens.add({targets:c,scaleX:1.07,scaleY:1.07,duration:80}));
  c.on('pointerout', ()=>scene.tweens.add({targets:c,scaleX:1,scaleY:1,duration:80}));
  c.on('pointerdown',()=>scene.tweens.add({targets:c,scaleX:0.94,scaleY:0.94,duration:50}));
  c.on('pointerup',  ()=>scene.tweens.add({targets:c,scaleX:1.07,scaleY:1.07,duration:50}));
  return c;
}

function coinBadge(scene, x, y, coins, depth=0) {
  const g = scene.add.graphics();
  g.fillStyle(0x221100,0.85); g.fillRoundedRect(x-60,y-15,120,30,8);
  g.setDepth(depth);
  scene.add.text(x, y, `COINS: ${coins}`, {
    fontSize:'13px', color:'#ffdd00', stroke:'#000', strokeThickness:2, fontStyle:'bold'
  }).setOrigin(0.5).setDepth(depth);
}

function header(scene, title, depth=0) {
  scene.add.text(W/2,28,title,{
    fontSize:'26px', color:'#ffdd00',
    stroke:'#000000', strokeThickness:5, fontStyle:'bold'
  }).setOrigin(0.5,0.5).setDepth(depth);
  const b = makeBtn(scene,55,28,90,38,'< BACK',0x334466);
  b.setDepth(depth);
  b.on('pointerup',()=>scene.scene.start('HomeScene'));
}

// ─────────────────────────────────────────────────────────
//  HOME SCENE
// ─────────────────────────────────────────────────────────
class HomeScene extends Phaser.Scene {
  constructor() { super('HomeScene'); }

  create() {
    buildTextures(this);

    // Validate saved character is still unlocked
    const data = loadData();
    const saved = this.registry.get('selectedChar');
    if (!saved || !data.unlocked.includes(saved.id)) {
      this.registry.set('selectedChar', CHARS.find(c => data.unlocked.includes(c.id)) || CHARS[0]);
    }
    const ch = this.registry.get('selectedChar');

    drawBG(this);

    // Coin badge top-right
    coinBadge(this, W - 75, 26, data.coins);

    // Server status indicator (top-left)
    const statusDot = this.add.text(12, 8, '● CONNECTING...', {
      fontSize:'11px', color:'#888888', stroke:'#000', strokeThickness:2
    }).setOrigin(0, 0);
    connectToServer(online => {
      if (!this.scene.isActive('HomeScene')) return;
      statusDot.setText(online ? '● SERVER ONLINE' : '● SERVER OFFLINE');
      statusDot.setColor(online ? '#44ff88' : '#ff4444');
    });

    // Title
    const lcsFont    = Math.min(Math.floor(H * 0.14), 58);
    const subtitleFont = Math.min(Math.floor(H * 0.06), 26);
    const titleY = H * 0.1;
    this.add.text(W/2, titleY, 'LCS', {
      fontSize:lcsFont+'px', color:'#ffdd00',
      stroke:'#994400', strokeThickness:9, fontStyle:'bold'
    }).setOrigin(0.5);
    this.add.text(W/2, titleY + lcsFont, 'LAST CIRCLE STANDING', {
      fontSize:subtitleFont+'px', color:'#ffffff',
      stroke:'#222222', strokeThickness:6, fontStyle:'bold'
    }).setOrigin(0.5);

    // Character preview — centered
    const charY = H * 0.44;
    const ring = this.add.graphics();
    ring.fillStyle(ch.color, 0.2); ring.fillCircle(W/2, charY, 50);
    ring.lineStyle(3, ch.color, 0.7); ring.strokeCircle(W/2, charY, 50);
    const spr = this.add.image(W/2, charY, ch.id+'_md').setDepth(1);
    this.tweens.add({ targets:spr, y:charY-8, duration:950, yoyo:true, repeat:-1, ease:'Sine.easeInOut' });
    this.add.text(W/2, charY+46, ch.name, {
      fontSize:'20px', color:'#ffffff', stroke:'#000000', strokeThickness:4, fontStyle:'bold'
    }).setOrigin(0.5);
    this.add.text(W/2, charY+66, ch.tag, {
      fontSize:'12px', color:'#ffdd99', stroke:'#000000', strokeThickness:2
    }).setOrigin(0.5);

    // PLAY + MULTIPLAYER — side by side
    const bw = Math.min(200, W*0.27);
    const gap = bw/2 + 10;
    const play = makeBtn(this, W/2-gap, H*0.74, bw, 54, 'PLAY', 0x22cc44);
    play.on('pointerup', () => { this.registry.set('isMultiplayer',false); this.scene.start('GameScene'); });
    const multi = makeBtn(this, W/2+gap, H*0.74, bw, 54, '⚡ MULTI', 0x2255cc);
    multi.on('pointerup', () => this.scene.start('LobbyScene'));

    // Bottom nav
    const navY = H*0.91;
    const navGap = Math.min(148, W*0.17);
    const chars = makeBtn(this, W/2-navGap, navY, 120, 42, 'CHARACTERS', 0x2255cc);
    chars.on('pointerup', () => this.scene.start('CharSelectScene'));
    const shop = makeBtn(this, W/2, navY, 100, 42, 'SHOP', 0xcc5500);
    shop.on('pointerup', () => this.scene.start('ShopScene'));
    const sett = makeBtn(this, W/2+navGap, navY, 110, 42, 'SETTINGS', 0x445566);
    sett.on('pointerup', () => this.scene.start('SettingsScene'));

    this.add.text(W/2, H-8, '© 2026 William Drye', {fontSize:'11px',color:'#444466'}).setOrigin(0.5,1);
    this.add.text(W-8,H-8,'v.9303e5c',{fontSize:'11px',color:'#555577'}).setOrigin(1,1);
  }
}

// ─────────────────────────────────────────────────────────
//  CHARACTER SELECT SCENE
// ─────────────────────────────────────────────────────────
class CharSelectScene extends Phaser.Scene {
  constructor() { super('CharSelectScene'); }

  create() {
    buildTextures(this);
    drawBG(this);

    this.gd = loadData();
    this.cards = [];
    this.scrollOffset = 0;
    this.isDragging   = false;

    // Default selection — first unlocked char
    const saved = this.registry.get('selectedChar');
    this.selIdx = CHARS.findIndex(c => c.id === saved?.id && this.gd.unlocked.includes(c.id));
    if (this.selIdx < 0) this.selIdx = CHARS.findIndex(c => this.gd.unlocked.includes(c.id));

    this.buildGrid();

    // Mask panels — solid background rects that hide cards scrolling out of view
    const BG = 0x080818;
    this.add.graphics().fillStyle(BG,1).fillRect(0,0,W,58).setDepth(20);
    this.add.graphics().fillStyle(BG,1).fillRect(0,H-68,W,68).setDepth(20);

    // Scroll hint (hidden once fully scrolled down)
    this.scrollHint = this.add.text(W/2, H-72, '▼  scroll for more  ▼', {
      fontSize:'11px', color:'#ffffff55'
    }).setOrigin(0.5,1).setDepth(22);
    this.scrollHint.setVisible(this.maxScroll > 5);

    // Header and coin badge drawn above the mask panels
    header(this, 'SELECT FIGHTER', 21);
    coinBadge(this, W-75, 26, this.gd.coins, 21);

    // Play button above mask
    const playBtn = makeBtn(this, W/2, H-34, 210, 52, 'PLAY', 0x22cc44);
    playBtn.setDepth(21);
    playBtn.on('pointerup', () => {
      this.registry.set('selectedChar', CHARS[this.selIdx]);
      this.scene.start('GameScene');
    });

    this.refreshBorders();
  }

  buildGrid() {
    const cols = 3;
    const rows = Math.ceil(CHARS.length / cols);
    const cw = Math.min(160, (W-60)/cols);
    const ch = 130;
    const gx = 12, gy = 10;
    const totalW = cols*cw + (cols-1)*gx;
    const totalH = rows*ch + (rows-1)*gy;
    const sx = (W-totalW)/2;
    const headerH = 58, footerH = 68;
    const viewH = H - headerH - footerH;
    this.maxScroll = Math.max(0, totalH + 16 - viewH);

    CHARS.forEach((c,i) => {
      const col = i%cols, row = Math.floor(i/cols);
      const cx = sx + col*(cw+gx) + cw/2;
      const cy = headerH + row*(ch+gy) + ch/2 + 8;
      this.makeCard(cx, cy, cw, ch, c, i);
    });

    // Touch scroll
    let dragStartY = 0, dragStartOffset = 0;
    this.input.on('pointerdown', p => {
      dragStartY = p.y; dragStartOffset = this.scrollOffset;
    });
    this.input.on('pointermove', p => {
      if (!p.isDown) return;
      if (Math.abs(p.y - dragStartY) > 8) this.isDragging = true;
      if (!this.isDragging) return;
      const next = Phaser.Math.Clamp(dragStartOffset + (dragStartY - p.y), 0, this.maxScroll);
      if (Math.abs(next - this.scrollOffset) > 0.5) {
        this.scrollOffset = next;
        this.cards.forEach(({ con, baseY }) => { con.y = baseY - this.scrollOffset; });
        if (this.scrollHint) this.scrollHint.setVisible(this.scrollOffset < this.maxScroll - 5);
      }
    });
    this.input.on('pointerup', () => { this.isDragging = false; });
  }

  makeCard(cx, cy, cw, ch, char, idx) {
    const isUnlocked = this.gd.unlocked.includes(char.id);
    const canAfford  = !isUnlocked && this.gd.coins >= char.cost;

    const con = this.add.container(cx, cy).setDepth(5);
    const bg = this.add.graphics();
    bg.fillStyle(0x111122, 0.92);
    bg.fillRoundedRect(-cw/2,-ch/2,cw,ch,12);
    const border = this.add.graphics();
    const spr = this.add.image(0,-ch*0.1, char.id+'_md').setDepth(1);
    const nm = this.add.text(0, ch*0.22, char.name, {
      fontSize:'15px', color:'#ffffff', stroke:'#000', strokeThickness:3, fontStyle:'bold'
    }).setOrigin(0.5);
    const tg = this.add.text(0, ch*0.38, char.tag, {
      fontSize:'10px', color:'#ffdd99'
    }).setOrigin(0.5);

    con.add([bg, border, spr, nm, tg]);

    if (isUnlocked) {
      con.setInteractive(new Phaser.Geom.Rectangle(-cw/2,-ch/2,cw,ch), Phaser.Geom.Rectangle.Contains);
      con.on('pointerup', () => { if (!this.isDragging) { this.selIdx=idx; this.refreshBorders(); } });
      con.on('pointerover',()=>this.tweens.add({targets:con,scaleX:1.04,scaleY:1.04,duration:80}));
      con.on('pointerout', ()=>this.tweens.add({targets:con,scaleX:1,scaleY:1,duration:80}));
    } else {
      // Lock overlay
      const ov = this.add.graphics();
      ov.fillStyle(0x000000, canAfford ? 0.55 : 0.72);
      ov.fillRoundedRect(-cw/2,-ch/2,cw,ch,12);

      // Glowing border if affordable
      if (canAfford) {
        ov.lineStyle(2, 0xffdd00, 0.7);
        ov.strokeRoundedRect(-cw/2,-ch/2,cw,ch,12);
      }

      const costCol = canAfford ? '#ffdd00' : '#888899';
      const costTxt = this.add.text(0, -ch*0.06, `${char.cost} COINS`, {
        fontSize:'15px', color:costCol, stroke:'#000', strokeThickness:3, fontStyle:'bold'
      }).setOrigin(0.5);

      const hintTxt = this.add.text(0, ch*0.18,
        canAfford ? 'TAP TO UNLOCK' : 'NOT ENOUGH COINS', {
        fontSize:'10px', color: canAfford ? '#88ff88' : '#886666'
      }).setOrigin(0.5);

      con.add([ov, costTxt, hintTxt]);

      if (canAfford) {
        con.setInteractive(new Phaser.Geom.Rectangle(-cw/2,-ch/2,cw,ch), Phaser.Geom.Rectangle.Contains);
        con.on('pointerup', () => { if (!this.isDragging) this.showUnlockPopup(char); });
        con.on('pointerover',()=>this.tweens.add({targets:con,scaleX:1.04,scaleY:1.04,duration:80}));
        con.on('pointerout', ()=>this.tweens.add({targets:con,scaleX:1,scaleY:1,duration:80}));
      }
    }

    this.cards.push({ con, border, char, cw, ch, baseY: cy });
  }

  refreshBorders() {
    this.cards.forEach(({border,char,cw,ch},i) => {
      border.clear();
      if (i === this.selIdx) {
        border.lineStyle(3, char.color, 1);
        border.strokeRoundedRect(-cw/2,-ch/2,cw,ch,12);
        border.fillStyle(char.color, 0.13);
        border.fillRoundedRect(-cw/2,-ch/2,cw,ch,12);
      }
    });
  }

  showUnlockPopup(char) {
    const pop = [];
    const close = () => { pop.forEach(el => el.destroy()); };

    // Blocker + dimmer
    const zone = this.add.zone(W/2,H/2,W,H).setInteractive().setDepth(200);
    const dim = this.add.graphics().setDepth(200);
    dim.fillStyle(0x000000, 0.72); dim.fillRect(0,0,W,H);
    pop.push(zone, dim);

    // Box
    const bw = Math.min(310, W*0.78), bh = 220;
    const box = this.add.graphics().setDepth(201);
    box.fillStyle(0x0d0d2a, 1); box.fillRoundedRect(W/2-bw/2,H/2-bh/2,bw,bh,16);
    box.lineStyle(3, char.color, 1); box.strokeRoundedRect(W/2-bw/2,H/2-bh/2,bw,bh,16);
    pop.push(box);

    // Character sprite + name
    const charSpr = this.add.image(W/2, H/2-72, char.id+'_md').setDepth(202);
    const title = this.add.text(W/2, H/2-28, 'UNLOCK '+char.name.toUpperCase()+'?', {
      fontSize:'18px', color:'#ffdd00', stroke:'#000', strokeThickness:3, fontStyle:'bold'
    }).setOrigin(0.5).setDepth(202);
    const desc = this.add.text(W/2, H/2+10, char.desc, {
      fontSize:'11px', color:'#aaaacc', align:'center', wordWrap:{width:bw-30}
    }).setOrigin(0.5).setDepth(202);
    const costLine = this.add.text(W/2, H/2+44, `Cost: ${char.cost} coins   (You have: ${this.gd.coins})`, {
      fontSize:'13px', color:'#ffdd99'
    }).setOrigin(0.5).setDepth(202);
    pop.push(charSpr, title, desc, costLine);

    // Buttons
    const unlockBtn = makeBtn(this, W/2-68, H/2+82, 120, 42, 'UNLOCK', 0x22cc44);
    unlockBtn.setDepth(203);
    unlockBtn.on('pointerup', () => {
      this.gd.coins -= char.cost;
      this.gd.unlocked.push(char.id);
      saveData(this.gd);
      close();
      this.scene.restart();
    });

    const cancelBtn = makeBtn(this, W/2+68, H/2+82, 110, 42, 'CANCEL', 0x444466);
    cancelBtn.setDepth(203);
    cancelBtn.on('pointerup', close);

    pop.push(unlockBtn, cancelBtn);
  }
}

// ─────────────────────────────────────────────────────────
//  GAME SCENE
// ─────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  create() {
    this.WORLD={w:2400,h:2400};
    this.physics.world.setBounds(0,0,this.WORLD.w,this.WORLD.h);
    buildTextures(this);

    this.ch = this.registry.get('selectedChar') || CHARS[0];
    this.killCount = 0;
    this.isMP = this.registry.get('isMultiplayer') === true;
    this.remotePlayers = {};
    this.posTimer = 0;

    this.makeMap();
    this.makePlayer();

    // In multiplayer, reduce bots by the number of other human players
    const mpPlayers = this.isMP ? (this.registry.get('mpPlayers') || []) : [];
    const botCount  = this.isMP ? Math.max(0, 6 - (mpPlayers.length - 1)) : 6;
    this.makeEnemies(botCount);

    this.pBullets = this.physics.add.group();
    this.eBullets = this.physics.add.group();
    this.lastShot = 0;
    this.makeCollisions();

    if (this.isMP) {
      mpPlayers.forEach(p => { if (p.id !== socket?.id) this.spawnRemotePlayer(p); });
      this.setupMultiplayerListeners();
    }

    this.cameras.main.setBounds(0,0,this.WORLD.w,this.WORLD.h);
    this.cameras.main.startFollow(this.player,true,0.09,0.09);

    this.keys = this.input.keyboard.addKeys({
      up:'W',down:'S',left:'A',right:'D',
      aUp:'UP',aDown:'DOWN',aLeft:'LEFT',aRight:'RIGHT',fire:'SPACE'
    });
    this.lJoyBase   = { x: 90, y: H - 85 };
    this.fireBtnPos = { x: W - 90, y: H - 85 };
    this.lJoy     = { on:false, id:null, bx:0, by:0, dx:0, dy:0 };
    this.fireBtn  = { on:false, id:null };
    this.lastFacing = { x:1, y:0 };
    this.input.on('pointerdown',this.touchDown,this);
    this.input.on('pointermove',this.touchMove, this);
    this.input.on('pointerup',  this.touchUp,   this);

    this.makeUI();
    this.gameOver=false;
  }

  // ─── MAP ─────────────────────────────────────────────

  makeMap() {
    const {w,h}=this.WORLD;
    const bg=this.add.graphics();
    bg.fillStyle(0x3a7a3a); bg.fillRect(0,0,w,h);
    bg.lineStyle(1,0x2d6a2d,0.22);
    for (let x=0;x<=w;x+=64) bg.lineBetween(x,0,x,h);
    for (let y=0;y<=h;y+=64) bg.lineBetween(0,y,w,y);
    this.add.graphics().lineStyle(8,0x111111,1).strokeRect(0,0,w,h);

    this.walls=this.physics.add.staticGroup();
    [
      [320,280,192,64],[700,160,64,256],[1050,320,320,64],
      [160,680,64,320],[560,560,160,160],[1200,200,256,64],
      [1540,200,64,320],[1760,560,192,64],[1920,300,64,256],
      [340,1100,256,64],[740,960,64,256],[1060,900,192,192],
      [1440,760,64,256],[1760,960,256,64],[1920,1100,64,256],
      [220,1500,192,64],[620,1380,64,256],[960,1260,320,64],
      [1160,1560,256,64],[1540,1380,64,320],[1760,1460,192,192],
      [460,1900,320,64],[960,1760,64,256],[1340,1880,256,64],[1860,1760,64,320],
    ].forEach(([cx,cy,ww,wh])=>{
      this.add.tileSprite(cx-ww/2,cy-wh/2,ww,wh,'wall').setOrigin(0);
      const b=this.walls.create(cx,cy,'wall');
      b.setVisible(false).setDisplaySize(ww,wh).refreshBody();
    });
  }

  // ─── PLAYER ──────────────────────────────────────────

  makePlayer() {
    const cx=this.WORLD.w/2, cy=this.WORLD.h/2;
    this.player=this.physics.add.sprite(cx,cy,this.ch.id+'_sm');
    this.player.setCollideWorldBounds(true).setDepth(10);
    this.player.health=this.ch.hp;
    this.player.maxHealth=this.ch.hp;
    this.nameTag=this.add.text(cx,cy-50,this.ch.name,{
      fontSize:'13px',color:'#fff',stroke:'#000',strokeThickness:3
    }).setOrigin(0.5,1).setDepth(11);
  }

  // ─── ENEMIES ─────────────────────────────────────────

  makeEnemies(n) {
    this.enemies=this.physics.add.group();
    for (let i=0;i<n;i++) {
      let x,y;
      do {
        x=Phaser.Math.Between(150,this.WORLD.w-150);
        y=Phaser.Math.Between(150,this.WORLD.h-150);
      } while(Phaser.Math.Distance.Between(x,y,this.player.x,this.player.y)<600);

      // Pick a random character for this bot
      const eChar = CHARS[Phaser.Math.Between(0, CHARS.length-1)];

      const e = this.enemies.create(x, y, eChar.id+'_sm');
      e.setCollideWorldBounds(true).setDepth(9);
      e.botId     = i;
      e.eChar     = eChar;
      e.health    = eChar.hp;
      e.maxHealth = eChar.hp;
      e.lastShot    = 0;
      e.wanderAngle = Math.random() * Math.PI * 2;
      e.wanderTimer = 0;
      e.stuckTimer  = 0;
      e.lastPos     = { x, y };

      // Name tag floats above the bot
      e.label = this.add.text(x, y-50, eChar.name, {
        fontSize:'11px', color:'#ffcccc', stroke:'#000000', strokeThickness:2
      }).setOrigin(0.5,1).setDepth(10);
    }
  }

  // ─── MULTIPLAYER ─────────────────────────────────────

  spawnRemotePlayer(p) {
    const char = CHARS.find(c => c.id === p.charId) || CHARS[0];
    const sx = this.WORLD.w/2 + Phaser.Math.Between(-300,300);
    const sy = this.WORLD.h/2 + Phaser.Math.Between(-300,300);
    const sprite = this.add.sprite(sx, sy, char.id+'_sm').setDepth(10);
    const nameTag = this.add.text(sx, sy-50, p.name, {
      fontSize:'12px', color:'#88ffff', stroke:'#000', strokeThickness:2
    }).setOrigin(0.5,1).setDepth(11);
    this.remotePlayers[p.id] = {
      sprite, nameTag, hp: char.hp, maxHp: char.hp,
      targetX:sx, targetY:sy, targetRot:0
    };
  }

  setupMultiplayerListeners() {
    socket.off('player_moved').on('player_moved', ({ id, x, y, rotation, hp }) => {
      const rp = this.remotePlayers[id];
      if (!rp) return;
      rp.targetX = x; rp.targetY = y; rp.targetRot = rotation; rp.hp = hp;
    });
    // Remove sprite when player leaves room mid-game
    socket.off('room_update').on('room_update', data => {
      const live = new Set(data.players.map(p => p.id));
      Object.keys(this.remotePlayers).forEach(id => {
        if (!live.has(id)) {
          this.remotePlayers[id].sprite?.destroy();
          this.remotePlayers[id].nameTag?.destroy();
          delete this.remotePlayers[id];
        }
      });
    });
  }

  // ─── COLLISIONS ──────────────────────────────────────

  makeCollisions() {
    this.physics.add.collider(this.player,  this.walls);
    this.physics.add.collider(this.enemies, this.walls);
    this.physics.add.collider(this.pBullets,this.walls,(b)=>this.bulletHitsWall(b,false));
    this.physics.add.collider(this.eBullets,this.walls,(b)=>this.bulletHitsWall(b,true));
    this.physics.add.overlap(this.pBullets,this.enemies,this.hitEnemy,   null,this);
    this.physics.add.overlap(this.eBullets,this.player, this.hitPlayer,  null,this);
    this.physics.add.overlap(this.eBullets,this.enemies,this.hitBotByBot,null,this);
  }

  // ─── SHOOTING ────────────────────────────────────────

  pointInWall(px, py) {
    return this.walls.getChildren().some(w => {
      const b = w.body;
      return px >= b.x && px <= b.x + b.width && py >= b.y && py <= b.y + b.height;
    });
  }

  segmentHitsWall(x1, y1, x2, y2) {
    const steps = 10;
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      if (this.pointInWall(x1 + (x2-x1)*t, y1 + (y2-y1)*t)) return true;
    }
    return false;
  }

  traceRay(x, y, ang, maxDist) {
    const step = 16;
    let d = 30;
    while (d < maxDist) {
      if (this.pointInWall(x + Math.cos(ang)*d, y + Math.sin(ang)*d)) return d;
      d += step;
    }
    return maxDist;
  }

  bulletHitsWall(b, isEnemy) {
    if (!b.active) return;
    if (b.grenade) {
      const x=b.x, y=b.y, dmg=b.damage, ownerId=b.ownerBotId??-1;
      b.destroy();
      this.spawnExplosion(x, y, dmg, isEnemy, ownerId);
    } else {
      b.destroy();
    }
  }

  spawnExplosion(x, y, dmg, isEnemy, ownerId) {
    const shrapDmg = Math.round(dmg * 0.35);
    const life = 380;
    const group = isEnemy ? this.eBullets : this.pBullets;
    for (let i = 0; i < 8; i++) {
      const ang = (i / 8) * Math.PI * 2;
      const bx = x + Math.cos(ang)*14, by = y + Math.sin(ang)*14;
      if (this.pointInWall(bx, by)) continue;
      const s = group.create(bx, by, 'shrapnel');
      s.setDepth(8).setScale(0.9);
      s.setVelocity(Math.cos(ang)*700, Math.sin(ang)*700);
      s.damage = shrapDmg;
      s.birthTime = this.time.now; s.maxLife = life;
      if (isEnemy) s.ownerBotId = ownerId;
      this.time.delayedCall(life, ()=>{ if(s?.active) s.destroy(); });
    }
    const flash = this.add.graphics().setDepth(20);
    flash.fillStyle(0xff8800,0.85).fillCircle(x,y,44);
    flash.fillStyle(0xffdd00,0.5).fillCircle(x,y,22);
    this.time.delayedCall(140, ()=>flash.destroy());
  }

  shootPlayer(x, y, dx, dy) {
    const { atk, dmg, id } = this.ch;
    const baseAng = Math.atan2(dy, dx);
    const spd = 640 * atk.speedMult;

    atk.angles.forEach(offset => {
      const ang = baseAng + offset;
      const bx = x + Math.cos(ang) * 30;
      const by = y + Math.sin(ang) * 30;
      if (this.pointInWall(bx, by)) return;
      const b = this.pBullets.create(bx, by, id+'_b');
      b.setDepth(8).setScale(atk.scale);
      b.setVelocity(Math.cos(ang)*spd, Math.sin(ang)*spd);
      b.damage = dmg;
      b.birthTime = this.time.now; b.maxLife = atk.life;
      if (atk.rangeScale) b.rangeScale = true;
      if (atk.grenade) b.grenade = true;
      if (atk.homing)  b.homing  = true;
      if (atk.pierce !== undefined) { b.pierce = atk.pierce; b.hitTargets = new Set(); b.setRotation(ang); }
      this.time.delayedCall(atk.life, ()=>{ if(b?.active) b.destroy(); });
    });
  }

  shootEnemy(x, y, dx, dy, eChar, owner) {
    const { atk, dmg, id } = eChar;
    const baseAng = Math.atan2(dy, dx);
    const spd = 640 * atk.speedMult;

    atk.angles.forEach(offset => {
      const ang = baseAng + offset;
      const bx = x + Math.cos(ang) * 30;
      const by = y + Math.sin(ang) * 30;
      if (this.pointInWall(bx, by)) return;
      const b = this.eBullets.create(bx, by, id+'_b');
      b.setDepth(8).setScale(atk.scale);
      b.setVelocity(Math.cos(ang)*spd, Math.sin(ang)*spd);
      b.damage = dmg;
      b.ownerBotId = owner?.botId ?? -1;
      b.birthTime = this.time.now; b.maxLife = atk.life;
      if (atk.rangeScale) b.rangeScale = true;
      if (atk.grenade) b.grenade = true;
      if (atk.homing)  b.homing  = true;
      if (atk.pierce !== undefined) { b.pierce = atk.pierce; b.hitTargets = new Set(); b.setRotation(ang); }
      this.time.delayedCall(atk.life, ()=>{ if(b?.active) b.destroy(); });
    });
  }

  // ─── HIT HANDLERS ────────────────────────────────────

  rangedDmg(bullet) {
    if (!bullet.rangeScale) return bullet.damage;
    const t = Math.min(1, (this.time.now - bullet.birthTime) / bullet.maxLife);
    return Math.round(bullet.damage * (0.4 + 1.4 * t));
  }

  hitEnemy(bullet, enemy) {
    if (!bullet.active || !enemy.active) return;
    if (bullet.grenade) {
      const x=bullet.x, y=bullet.y, dmg=bullet.damage;
      bullet.destroy();
      this.spawnExplosion(x, y, dmg, false, -1);
      return;
    }
    const dmg = this.rangedDmg(bullet);
    if (bullet.pierce !== undefined) {
      if (!bullet.hitTargets) bullet.hitTargets = new Set();
      if (bullet.hitTargets.has(enemy.botId)) return;
      bullet.hitTargets.add(enemy.botId);
      enemy.health -= dmg;
      this.tweens.add({targets:enemy,alpha:0.1,duration:60,yoyo:true});
      if (bullet.pierce <= 0) bullet.destroy(); else bullet.pierce--;
    } else {
      bullet.destroy();
      enemy.health -= dmg;
      this.tweens.add({targets:enemy,alpha:0.1,duration:60,yoyo:true});
    }
    if (!enemy.active) return;
    if (enemy.health <= 0) {
      if (enemy.label) enemy.label.destroy();
      enemy.destroy();
      this.killCount++;
      const left = this.enemies.getChildren().length;
      this.cntLabel.setText('Enemies: '+left);
      if (left === 0) this.endGame(true);
    }
  }

  hitPlayer(player, bullet) {
    if (this.gameOver || !bullet.active) return;
    if (localStorage.getItem('br_godmode') === 'true') { bullet.destroy(); return; }
    if (bullet.grenade) {
      const x=bullet.x, y=bullet.y, dmg=bullet.damage, ownerId=bullet.ownerBotId??-1;
      bullet.destroy();
      this.spawnExplosion(x, y, dmg, true, ownerId);
      return;
    }
    const dmg = this.rangedDmg(bullet);
    bullet.destroy();
    this.player.health = Math.max(0, this.player.health - dmg);
    this.tweens.add({targets:this.player,alpha:0.1,duration:80,yoyo:true});
    if (this.player.health === 0) this.endGame(false);
  }

  hitBotByBot(bullet, enemy) {
    if (!bullet.active || !enemy.active) return;
    if (bullet.ownerBotId === enemy.botId) return;
    if (bullet.grenade) {
      const x=bullet.x, y=bullet.y, dmg=bullet.damage, ownerId=bullet.ownerBotId??-1;
      bullet.destroy();
      this.spawnExplosion(x, y, dmg, true, ownerId);
      return;
    }
    const dmg = this.rangedDmg(bullet);
    if (bullet.pierce !== undefined) {
      if (!bullet.hitTargets) bullet.hitTargets = new Set();
      if (bullet.hitTargets.has(enemy.botId)) return;
      bullet.hitTargets.add(enemy.botId);
      enemy.health -= dmg;
      this.tweens.add({targets:enemy,alpha:0.1,duration:60,yoyo:true});
      if (bullet.pierce <= 0) bullet.destroy(); else bullet.pierce--;
    } else {
      bullet.destroy();
      enemy.health -= dmg;
      this.tweens.add({targets:enemy,alpha:0.1,duration:60,yoyo:true});
    }
    if (!enemy.active) return;
    if (enemy.health <= 0) {
      if (enemy.label) enemy.label.destroy();
      enemy.destroy();
      const left = this.enemies.getChildren().length;
      this.cntLabel.setText('Enemies: '+left);
      if (left === 0) this.endGame(true);
    }
  }

  // ─── END GAME ────────────────────────────────────────

  endGame(won) {
    if (this.gameOver) return;
    this.gameOver = true;
    this.physics.pause();
    if (this.isMP && socket?.connected) socket.emit('leave_room');

    // Save coins earned
    const earned = this.killCount * 15 + (won ? 80 : 0);
    const data = loadData();
    data.coins += earned;
    saveData(data);

    // Overlay
    this.add.graphics().fillStyle(0x000000,0.55).fillRect(0,0,W,H).setScrollFactor(0).setDepth(199);

    this.add.text(W/2, H/2-56, won?'VICTORY!':'DEFEATED!', {
      fontSize:'58px', color:won?'#ffdd00':'#ff4444', stroke:'#000', strokeThickness:8
    }).setOrigin(0.5).setScrollFactor(0).setDepth(200);

    this.add.text(W/2, H/2+8, won?'All enemies cleared!':'You were knocked out!', {
      fontSize:'20px', color:'#ffffff', stroke:'#000', strokeThickness:4
    }).setOrigin(0.5).setScrollFactor(0).setDepth(200);

    this.add.text(W/2, H/2+38, `+${earned} COINS  (${this.killCount} kills${won?' + win bonus':''})`, {
      fontSize:'16px', color:'#ffdd00', stroke:'#000', strokeThickness:3
    }).setOrigin(0.5).setScrollFactor(0).setDepth(200);

    this.add.text(W/2, H/2+76, 'Tap to return home', {
      fontSize:'17px', color:'#bbbbbb'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(200);

    this.time.delayedCall(900, ()=>{
      this.input.once('pointerdown', ()=>this.scene.start('HomeScene'));
    });
  }

  // ─── UI ──────────────────────────────────────────────

  makeUI() {
    this.hpBg     = this.add.graphics().setScrollFactor(0).setDepth(100);
    this.hpFg     = this.add.graphics().setScrollFactor(0).setDepth(101);
    this.joyFx    = this.add.graphics().setScrollFactor(0).setDepth(99);
    this.worldHpGfx = this.add.graphics().setDepth(15);
    this.aimGfx   = this.add.graphics().setDepth(7);

    // Fixed joystick base rings (always visible)
    const joyBases = this.add.graphics().setScrollFactor(0).setDepth(98);
    // Move joystick ring (left)
    joyBases.fillStyle(0xffffff, 0.07); joyBases.fillCircle(this.lJoyBase.x, this.lJoyBase.y, 60);
    joyBases.lineStyle(2, 0xffffff, 0.25); joyBases.strokeCircle(this.lJoyBase.x, this.lJoyBase.y, 60);
    this.add.text(this.lJoyBase.x, this.lJoyBase.y + 68, 'MOVE', {
      fontSize:'11px', color:'#ffffff66', stroke:'#000', strokeThickness:1
    }).setOrigin(0.5).setScrollFactor(0).setDepth(103);
    // Fire button ring (right, red tint)
    joyBases.fillStyle(0xff2200, 0.18); joyBases.fillCircle(this.fireBtnPos.x, this.fireBtnPos.y, 55);
    joyBases.lineStyle(3, 0xff5500, 0.7); joyBases.strokeCircle(this.fireBtnPos.x, this.fireBtnPos.y, 55);
    this.add.text(this.fireBtnPos.x, this.fireBtnPos.y, 'FIRE', {
      fontSize:'18px', color:'#ff8866', fontStyle:'bold', stroke:'#000', strokeThickness:3
    }).setOrigin(0.5).setScrollFactor(0).setDepth(103);

    // HP (top-left)
    this.add.text(16, 4, 'HP', {fontSize:'11px',color:'#ff8888',stroke:'#000',strokeThickness:2}).setScrollFactor(0).setDepth(102);
    this.cntLabel = this.add.text(W/2, 8, 'Enemies: 6', {
      fontSize:'18px', color:'#fff', stroke:'#000', strokeThickness:4
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(100);
  }

  // ─── TOUCH ───────────────────────────────────────────

  touchDown(p) {
    const dL = Phaser.Math.Distance.Between(p.x, p.y, this.lJoyBase.x, this.lJoyBase.y);
    const dF = Phaser.Math.Distance.Between(p.x, p.y, this.fireBtnPos.x, this.fireBtnPos.y);
    if (!this.lJoy.on && dL <= 100) {
      Object.assign(this.lJoy, { on:true, id:p.id, bx:this.lJoyBase.x, by:this.lJoyBase.y, dx:0, dy:0 });
    } else if (!this.fireBtn.on && dF <= 90) {
      Object.assign(this.fireBtn, { on:true, id:p.id });
    }
  }
  touchMove(p) {
    if (!this.lJoy.on || this.lJoy.id !== p.id) return;
    const dx=p.x-this.lJoy.bx, dy=p.y-this.lJoy.by, len=Math.hypot(dx,dy), max=55;
    this.lJoy.dx = len>max ? dx/len*max : dx;
    this.lJoy.dy = len>max ? dy/len*max : dy;
  }
  touchUp(p) {
    if (this.lJoy.on   && this.lJoy.id   === p.id) Object.assign(this.lJoy, {on:false, dx:0, dy:0});
    if (this.fireBtn.on && this.fireBtn.id === p.id) this.fireBtn.on = false;
  }

  // ─── DRAW HELPERS ────────────────────────────────────

  drawHP() {
    this.hpBg.clear(); this.hpFg.clear();
    const x=16, y=18, bw=150, bh=12;
    this.hpBg.fillStyle(0x000000,0.65); this.hpBg.fillRoundedRect(x,y,bw,bh,6);
    const pct=this.player.health/this.player.maxHealth;
    const col=pct>0.5?0x33ee55:pct>0.25?0xffaa00:0xff3300;
    this.hpFg.fillStyle(col,1);
    this.hpFg.fillRoundedRect(x+2,y+2,Math.max(0,(bw-4)*pct),bh-4,4);
  }

  drawAimIndicator() {
    this.aimGfx.clear();
    const isAiming = this.fireBtn.on || this.keys.fire.isDown;
    if (!isAiming || !this.player?.active) return;
    const { atk, bulletColor } = this.ch;
    const maxRange = 640 * atk.speedMult * atk.life / 1000;
    const baseAng = Math.atan2(this.lastFacing.y, this.lastFacing.x);
    const dash = 12, seg = 21;
    atk.angles.forEach(offset => {
      const ang = baseAng + offset;
      const range = this.traceRay(this.player.x, this.player.y, ang, maxRange);
      let d = 30;
      while (d < range) {
        const dEnd = Math.min(d + dash, range);
        const alpha = 0.65 * (1 - (d / range) * 0.65);
        this.aimGfx.lineStyle(2, bulletColor, alpha);
        this.aimGfx.beginPath();
        this.aimGfx.moveTo(this.player.x + Math.cos(ang)*d, this.player.y + Math.sin(ang)*d);
        this.aimGfx.lineTo(this.player.x + Math.cos(ang)*dEnd, this.player.y + Math.sin(ang)*dEnd);
        this.aimGfx.strokePath();
        d += seg;
      }
    });
  }

  drawWorldHP() {
    this.worldHpGfx.clear();
    const bar = (x, y, hp, maxHp) => {
      const bw=44, bh=5, bx=x-bw/2, by=y-54;
      const pct = Math.max(0, hp/maxHp);
      const col = pct>0.5 ? 0x33ee55 : pct>0.25 ? 0xffaa00 : 0xff3300;
      this.worldHpGfx.fillStyle(0x000000, 0.7); this.worldHpGfx.fillRect(bx-1,by-1,bw+2,bh+2);
      this.worldHpGfx.fillStyle(col, 1);         this.worldHpGfx.fillRect(bx,by,bw*pct,bh);
    };
    bar(this.player.x, this.player.y, this.player.health, this.player.maxHealth);
    this.enemies.getChildren().forEach(e => bar(e.x, e.y, e.health, e.maxHealth));
    Object.values(this.remotePlayers).forEach(rp => {
      if (rp.sprite?.active) bar(rp.sprite.x, rp.sprite.y, rp.hp, rp.maxHp);
    });
  }

  drawControls() {
    this.joyFx.clear();
    // Left joystick stick dot
    const sx = this.lJoyBase.x + (this.lJoy.on ? this.lJoy.dx : 0);
    const sy = this.lJoyBase.y + (this.lJoy.on ? this.lJoy.dy : 0);
    this.joyFx.fillStyle(0xffffff, this.lJoy.on ? 0.45 : 0.18);
    this.joyFx.fillCircle(sx, sy, 26);
    // Fire button press highlight
    if (this.fireBtn.on) {
      this.joyFx.fillStyle(0xff5500, 0.55);
      this.joyFx.fillCircle(this.fireBtnPos.x, this.fireBtnPos.y, 55);
    }
  }

  // ─── UPDATE ──────────────────────────────────────────

  update(time) {
    if (this.gameOver) return;

    const spd = this.ch.spd;
    let vx=0, vy=0;
    const k = this.keys;
    if(k.left.isDown ||k.aLeft.isDown)  vx-=spd;
    if(k.right.isDown||k.aRight.isDown) vx+=spd;
    if(k.up.isDown   ||k.aUp.isDown)    vy-=spd;
    if(k.down.isDown ||k.aDown.isDown)  vy+=spd;
    if(this.lJoy.on){
      const len=Math.hypot(this.lJoy.dx,this.lJoy.dy);
      if(len>8){vx=this.lJoy.dx/55*spd; vy=this.lJoy.dy/55*spd;}
    }
    this.player.setVelocity(vx,vy);
    if(vx||vy) this.player.setRotation(Math.atan2(vy,vx));

    // Track last facing direction from movement; auto-aim when standing still + firing
    if (vx || vy) {
      const len = Math.hypot(vx, vy);
      this.lastFacing.x = vx/len; this.lastFacing.y = vy/len;
    } else if (this.fireBtn.on) {
      let nearest = null, nearDist = Infinity;
      this.enemies.getChildren().forEach(e => {
        const d = Phaser.Math.Distance.Between(this.player.x, this.player.y, e.x, e.y);
        if (d < nearDist) { nearDist = d; nearest = e; }
      });
      if (nearest) {
        const dx = nearest.x - this.player.x, dy = nearest.y - this.player.y;
        const len = Math.hypot(dx, dy);
        this.lastFacing.x = dx/len; this.lastFacing.y = dy/len;
      }
    }

    // Shoot
    const cd = this.ch.atk.cooldown;
    if (this.fireBtn.on && time - this.lastShot > cd) {
      this.shootPlayer(this.player.x, this.player.y, this.lastFacing.x, this.lastFacing.y);
      this.lastShot = time;
    }
    if (k.fire.isDown && (vx||vy) && time - this.lastShot > cd) {
      this.shootPlayer(this.player.x, this.player.y, vx, vy);
      this.lastShot = time;
    }

    // Fade bullets near the end of their range
    const fadeWin = 350;
    [...this.pBullets.getChildren(), ...this.eBullets.getChildren()].forEach(b => {
      if (!b.active || b.maxLife === undefined) return;
      const remaining = b.maxLife - (time - b.birthTime);
      b.setAlpha(remaining < fadeWin ? Math.max(0.05, remaining / fadeWin) : 1);
    });

    // Homing bullet steering
    this.pBullets.getChildren().forEach(b => {
      if (!b.active || !b.homing) return;
      let nearE = null, nearD = Infinity;
      this.enemies.getChildren().forEach(e => {
        const d = Phaser.Math.Distance.Between(b.x, b.y, e.x, e.y);
        if (d < nearD) { nearD = d; nearE = e; }
      });
      if (!nearE) return;
      const tAng = Math.atan2(nearE.y - b.y, nearE.x - b.x);
      const cAng = Math.atan2(b.body.velocity.y, b.body.velocity.x);
      const spd  = Math.hypot(b.body.velocity.x, b.body.velocity.y);
      const diff = Phaser.Math.Angle.Wrap(tAng - cAng);
      const nAng = cAng + Phaser.Math.Clamp(diff, -0.07, 0.07);
      b.setVelocity(Math.cos(nAng)*spd, Math.sin(nAng)*spd);
    });
    this.eBullets.getChildren().forEach(b => {
      if (!b.active || !b.homing || !this.player?.active) return;
      const tAng = Math.atan2(this.player.y - b.y, this.player.x - b.x);
      const cAng = Math.atan2(b.body.velocity.y, b.body.velocity.x);
      const spd  = Math.hypot(b.body.velocity.x, b.body.velocity.y);
      const diff = Phaser.Math.Angle.Wrap(tAng - cAng);
      const nAng = cAng + Phaser.Math.Clamp(diff, -0.07, 0.07);
      b.setVelocity(Math.cos(nAng)*spd, Math.sin(nAng)*spd);
    });

    // Enemy AI
    this.enemies.getChildren().forEach(e => {
      // Find nearest target
      let targetX = this.player.x, targetY = this.player.y;
      let nearestDist = Phaser.Math.Distance.Between(e.x, e.y, this.player.x, this.player.y);
      this.enemies.getChildren().forEach(other => {
        if (other === e) return;
        const d = Phaser.Math.Distance.Between(e.x, e.y, other.x, other.y);
        if (d < nearestDist) { nearestDist = d; targetX = other.x; targetY = other.y; }
      });

      const dx = targetX - e.x, dy = targetY - e.y;
      const toTargetAng = Math.atan2(dy, dx);
      const hasLOS = !this.segmentHitsWall(e.x, e.y, targetX, targetY);
      const eSpd = e.eChar.spd;

      // Periodically shift wander direction
      if (time > e.wanderTimer) {
        e.wanderAngle += (Math.random() - 0.5) * Math.PI * 1.5;
        e.wanderTimer = time + 1200 + Math.random() * 1800;
      }

      // Stuck detection — if barely moving, break out with a new wander angle
      const moved = Math.hypot(e.x - e.lastPos.x, e.y - e.lastPos.y);
      if (moved < 3) {
        e.stuckTimer++;
        if (e.stuckTimer > 25) {
          e.wanderAngle = toTargetAng + (Math.random() > 0.5 ? 1 : -1) * (0.9 + Math.random() * 0.7);
          e.wanderTimer = time + 600;
          e.stuckTimer  = 0;
        }
      } else { e.stuckTimer = 0; }
      e.lastPos = { x: e.x, y: e.y };

      // Movement: navigate around walls, strafe in combat, wander when blocked
      let moveAng;
      if (!hasLOS) {
        moveAng = e.wanderAngle; // wall in the way — navigate around it
      } else if (nearestDist > 380) {
        moveAng = toTargetAng + (Math.random() - 0.5) * 0.5; // close in loosely
      } else if (nearestDist > 150) {
        moveAng = toTargetAng + (Math.random() - 0.5) * 1.2; // strafe in combat
      } else {
        moveAng = toTargetAng + Math.PI + (Math.random() - 0.5) * 0.6; // back away
      }
      e.setVelocity(Math.cos(moveAng) * eSpd, Math.sin(moveAng) * eSpd);
      e.setRotation(hasLOS ? toTargetAng : moveAng);

      // Only shoot when line-of-sight is clear
      const eCd = e.eChar.atk.cooldown;
      if (hasLOS && nearestDist < 600 && time - e.lastShot > eCd) {
        const spread = Math.min(0.6, 0.1 + nearestDist / 1000);
        const aimAng = toTargetAng + (Math.random() - 0.5) * 2 * spread;
        this.shootEnemy(e.x, e.y, Math.cos(aimAng), Math.sin(aimAng), e.eChar, e);
        e.lastShot = time;
      }
      if (e.label) e.label.setPosition(e.x, e.y - 50);
    });

    this.nameTag.setPosition(this.player.x, this.player.y-50);

    // Broadcast position to server (multiplayer)
    if (this.isMP && socket?.connected) {
      if (++this.posTimer >= 3) {
        this.posTimer = 0;
        socket.emit('move', {
          x: Math.round(this.player.x),
          y: Math.round(this.player.y),
          rotation: this.player.rotation,
          hp: this.player.health
        });
      }
    }

    // Smooth-lerp remote players toward their latest received position
    Object.values(this.remotePlayers).forEach(rp => {
      if (!rp.sprite?.active) return;
      rp.sprite.x        = Phaser.Math.Linear(rp.sprite.x,        rp.targetX,   0.25);
      rp.sprite.y        = Phaser.Math.Linear(rp.sprite.y,        rp.targetY,   0.25);
      rp.sprite.rotation = Phaser.Math.Angle.RotateTo(rp.sprite.rotation, rp.targetRot, 0.2);
      rp.nameTag.setPosition(rp.sprite.x, rp.sprite.y - 50);
    });

    this.drawHP();
    this.drawWorldHP();
    this.drawAimIndicator();
    this.drawControls();
  }

  shutdown() {
    if (!socket) return;
    socket.off('player_moved');
    socket.off('room_update');
  }
}

// ─────────────────────────────────────────────────────────
//  LOBBY SCENE
// ─────────────────────────────────────────────────────────
class LobbyScene extends Phaser.Scene {
  constructor() { super('LobbyScene'); }

  create() {
    buildTextures(this);
    drawBG(this);

    const saved = this.registry.get('selectedChar');
    const data  = loadData();
    this.unlockedChars = CHARS.filter(c => data.unlocked.includes(c.id));
    this.myCharIdx = Math.max(0, this.unlockedChars.findIndex(c => c.id === saved?.id));
    this.myName  = 'Fighter' + Phaser.Math.Between(100, 999);
    this.inRoom  = false;

    if (!socket?.connected) {
      connectToServer(ok => ok
        ? this.setupSocket()
        : this.showMsg('Cannot connect to server', '#ff4444'));
    } else {
      this.setupSocket();
    }

    this.buildUI();
  }

  ch() { return this.unlockedChars[this.myCharIdx]; }

  setupSocket() {
    socket.off('room_update').on('room_update', d => this.onRoom(d));
    socket.off('join_error').on('join_error',   m => this.showMsg(m, '#ff4444'));
    socket.off('game_start').on('game_start',   d => {
      this.registry.set('mpPlayers',    d.players);
      this.registry.set('isMultiplayer', true);
      this.registry.set('selectedChar',  this.ch());
      this.scene.start('GameScene');
    });
  }

  buildUI() {
    // ── header ──────────────────────────────────────────
    const back = makeBtn(this, 55, 28, 90, 38, '< BACK', 0x334466);
    back.on('pointerup', () => {
      if (this.inRoom) socket?.emit('leave_room');
      this.scene.start('HomeScene');
    });
    this.add.text(W/2, 28, 'MULTIPLAYER', {
      fontSize:'24px', color:'#ffdd00', stroke:'#000000', strokeThickness:5, fontStyle:'bold'
    }).setOrigin(0.5);

    // ── left column: character + name above it ──────────
    const lx = W * 0.25;
    const charY = H * 0.50;

    // Name displayed directly above the sprite
    this.add.text(lx, charY-80, 'YOUR NAME', {fontSize:'10px',color:'#aaaacc'}).setOrigin(0.5);
    this.nameTxt = this.add.text(lx, charY-62, this.myName, {
      fontSize:'17px', color:'#ffdd00', stroke:'#000', strokeThickness:3, fontStyle:'bold'
    }).setOrigin(0.5);

    // Character selector — arrows either side, sprite center
    const prev = makeBtn(this, lx-70, charY, 44, 44, '◄', 0x334466);
    const next = makeBtn(this, lx+70, charY, 44, 44, '►', 0x334466);
    this.charImg = this.add.image(lx, charY, this.ch().id+'_md').setScale(1.1);
    this.charLbl = this.add.text(lx, charY+48, this.ch().name, {
      fontSize:'15px', color:'#fff', stroke:'#000', strokeThickness:3, fontStyle:'bold'
    }).setOrigin(0.5);
    this.charTag = this.add.text(lx, charY+64, this.ch().tag, {
      fontSize:'10px', color:'#ffdd99'
    }).setOrigin(0.5);

    // Change name below character info
    const chgBtn = makeBtn(this, lx, charY+88, 130, 28, 'CHANGE NAME', 0x334466);
    chgBtn.on('pointerup', () => {
      const n = (window.prompt('Enter your name:', this.myName)||'').trim().slice(0,16);
      if (n) { this.myName=n; this.nameTxt.setText(n); this.emitUpdate(); }
    });

    const updChar = () => {
      this.charImg.setTexture(this.ch().id+'_md');
      this.charLbl.setText(this.ch().name);
      this.charTag.setText(this.ch().tag);
      this.emitUpdate();
    };
    prev.on('pointerup', ()=>{ this.myCharIdx=(this.myCharIdx-1+this.unlockedChars.length)%this.unlockedChars.length; updChar(); });
    next.on('pointerup', ()=>{ this.myCharIdx=(this.myCharIdx+1)%this.unlockedChars.length; updChar(); });

    // ── bottom buttons ───────────────────────────────────
    const btnY = H * 0.83;

    // Pre-room
    this.createBtn = makeBtn(this, lx-58, btnY, 100, 42, 'CREATE', 0x22cc44);
    this.createBtn.on('pointerup', () => {
      if (!socket?.connected) return this.showMsg('Not connected to server','#ff4444');
      socket.emit('create_room', { name:this.myName, charId:this.ch().id });
    });
    this.joinBtn = makeBtn(this, lx+58, btnY, 100, 42, 'JOIN', 0x2255cc);
    this.joinBtn.on('pointerup', () => {
      if (!socket?.connected) return this.showMsg('Not connected to server','#ff4444');
      const code = (window.prompt('Enter 4-letter room code:')||'').trim().toUpperCase();
      if (code.length !== 4) return this.showMsg('Code must be 4 letters','#ff4444');
      socket.emit('join_room', { code, name:this.myName, charId:this.ch().id });
    });

    // In-room
    this.codeTxt = this.add.text(lx, btnY-26, '', {
      fontSize:'20px', color:'#ffdd00', stroke:'#000', strokeThickness:4, fontStyle:'bold'
    }).setOrigin(0.5).setVisible(false)
      .setInteractive().on('pointerup', () => {
        const code = this.codeTxt.text.replace('ROOM: ','');
        navigator.clipboard?.writeText(code).catch(()=>{});
        this.showMsg('Code copied!','#44ff88');
      });

    this.readyBtn = makeBtn(this, lx-58, btnY, 100, 42, 'READY', 0xcc5500);
    this.readyBtn.setVisible(false);
    this.readyBtn.on('pointerup', ()=> socket?.emit('player_ready'));

    this.startBtn = makeBtn(this, lx+58, btnY, 100, 42, 'START', 0x22cc44);
    this.startBtn.setVisible(false);
    this.startBtn.on('pointerup', ()=> socket?.emit('start_game'));

    this.leaveBtn = makeBtn(this, lx, btnY+34, 150, 28, 'LEAVE ROOM', 0x882222);
    this.leaveBtn.setVisible(false);
    this.leaveBtn.on('pointerup', ()=>{
      socket?.emit('leave_room');
      this.inRoom = false;
      this.setRoomVis(false);
      this.clearList();
    });

    // ── right column: player list ────────────────────────
    const rx = W * 0.65;
    this.divider = this.add.graphics().setVisible(false);
    this.divider.lineStyle(1, 0x334466, 0.5);
    this.divider.lineBetween(W*0.5, H*0.1, W*0.5, H*0.95);

    this.listTitle = this.add.text(rx, H*0.18, '', {
      fontSize:'14px', color:'#aaaacc', stroke:'#000', strokeThickness:2
    }).setOrigin(0.5).setVisible(false);

    this.listRows = [];
    for (let i=0; i<10; i++) {
      this.listRows.push(
        this.add.text(rx, H*0.28+i*32, '', {
          fontSize:'13px', color:'#fff', stroke:'#000', strokeThickness:2, fontFamily:'monospace'
        }).setOrigin(0.5).setVisible(false)
      );
    }

    // Status
    this.msgTxt = this.add.text(W/2, H-14, '', {
      fontSize:'13px', color:'#ff4444', stroke:'#000', strokeThickness:2
    }).setOrigin(0.5);
  }

  setRoomVis(show) {
    this.createBtn.setVisible(!show);
    this.joinBtn.setVisible(!show);
    this.codeTxt.setVisible(show);
    this.readyBtn.setVisible(show);
    this.startBtn.setVisible(show);
    this.leaveBtn.setVisible(show);
    this.listTitle.setVisible(show);
    this.divider.setVisible(show);
  }

  clearList() { this.listRows.forEach(r => r.setVisible(false).setText('')); }

  emitUpdate() {
    if (this.inRoom && socket?.connected)
      socket.emit('player_update', { name:this.myName, charId:this.ch().id });
  }

  showMsg(msg, color='#ff4444') {
    this.msgTxt.setText(msg).setColor(color);
    this.time.delayedCall(3000, ()=>{ if(this.msgTxt?.active) this.msgTxt.setText(''); });
  }

  onRoom(data) {
    this.inRoom = true;
    this.setRoomVis(true);
    this.codeTxt.setText(`ROOM: ${data.code}  (tap to copy)`);

    const myP    = data.players.find(p => p.id === socket.id);
    const isHost = data.hostId === socket.id;
    const allRdy = data.players.length >= 1 && data.players.every(p => p.ready);

    this.readyBtn.list[2].setText(myP?.ready ? '✓ READY' : 'READY');
    this.startBtn.setVisible(isHost).setAlpha(allRdy ? 1 : 0.4);

    this.listTitle.setText(`Players (${data.players.length}/10)`).setVisible(true);
    this.clearList();
    data.players.forEach((p, i) => {
      const star = p.id === data.hostId ? '★' : ' ';
      const name = p.name.slice(0,12).padEnd(13);
      const char = (p.charId||'').slice(0,8).padEnd(9);
      const rdy  = p.ready ? '✓' : '✗';
      this.listRows[i]
        .setText(`${star} ${name}${char}${rdy}`)
        .setColor(p.id === socket.id ? '#ffdd00' : '#ffffff')
        .setVisible(true);
    });
  }

  shutdown() {
    socket?.off('room_update');
    socket?.off('join_error');
    socket?.off('game_start');
  }
}

// ─────────────────────────────────────────────────────────
//  LAUNCH
// ─────────────────────────────────────────────────────────
const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
if (isMobile) {
  if (screen.orientation?.lock) screen.orientation.lock('landscape').catch(()=>{});
  function checkRot() {
    document.getElementById('rot').style.display =
      window.innerWidth < window.innerHeight ? 'flex' : 'none';
  }
  checkRot();
  window.addEventListener('orientationchange', function() {
    setTimeout(function() {
      if (window.innerWidth > window.innerHeight) location.reload();
      else checkRot();
    }, 350);
  });
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  backgroundColor: '#080818',
  physics: { default:'arcade', arcade:{gravity:{y:0},debug:false} },
  scene: [HomeScene, CharSelectScene, ShopScene, SettingsScene, GameScene, LobbyScene],
  scale: { mode:Phaser.Scale.FIT, autoCenter:Phaser.Scale.CENTER_BOTH }
});
</script>
</body>
</html>
